<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dunaviela - Produto</title>

    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #4A1F12;
            overflow-x: hidden;
            color: #F1D8CD;
        }

        .glass-card {
            background: rgba(74, 31, 18, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(230, 194, 179, 0.2);
        }

        .bg-fixed-crochet {
            background-image: url('./produtos/crochet-bg.png');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
        }

        .overlay-gradient {
            background: linear-gradient(180deg, rgba(74, 31, 18, 0.7) 0%, rgba(74, 31, 18, 0.95) 100%);
        }

        h1,
        h2,
        h3 {
            font-family: 'Playfair Display', serif;
        }

        /* Accessiblity Focus States */
        a:focus-visible,
        button:focus-visible {
            outline: 2px solid #E6C2B3;
            outline-offset: 4px;
        }

        /* Gallery Styles */
        .gallery-thumb {
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .gallery-thumb.active {
            border-color: #E6C2B3;
            opacity: 1;
        }

        .gallery-thumb:hover {
            opacity: 0.8;
        }

        /* Preloader */
        #preloader {
            position: fixed;
            inset: 0;
            background: #4A1F12;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease-out, visibility 0.8s;
        }

        .loader-dot {
            width: 10px;
            height: 10px;
            background: #E6C2B3;
            border-radius: 50%;
            margin: 0 4px;
            animation: loader-dots 1.4s infinite ease-in-out both;
        }

        .loader-dot:nth-child(1) {
            animation-delay: -0.32s;
        }

        .loader-dot:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes loader-dots {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1.0);
            }
        }
    </style>
</head>

<body class="min-h-screen bg-fixed-crochet">
    <!-- Preloader -->
    <div id="preloader">
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
        <div class="loader-dot"></div>
    </div>

    <!-- Overlay principal -->
    <div class="fixed inset-0 overlay-gradient -z-10"></div>

    <!-- Botão Voltar -->
    <button onclick="window.location.href='./loja.html'"
        class="fixed top-8 left-6 md:left-12 z-50 flex items-center gap-2 text-sm uppercase tracking-widest opacity-60 hover:opacity-100 transition-opacity group text-[#F1D8CD]">
        <i data-lucide="arrow-left" class="w-4 h-4 transform group-hover:-translate-x-1 transition-transform"></i>
        <span>Voltar</span>
    </button>

    <main id="main-content"
        class="container mx-auto px-4 md:px-6 pt-28 pb-20 relative z-10 opacity-0 transition-opacity duration-1000">
        <div class="glass-card rounded-[48px] p-6 md:p-12 max-w-7xl mx-auto">
            <div class="grid lg:grid-cols-2 gap-12 lg:gap-20">

                <!-- Galeria de Imagens -->
                <div class="space-y-4">
                    <div class="aspect-[3/4] w-full rounded-3xl overflow-hidden bg-black/20 relative">
                        <img id="main-image" src="" alt="Produto"
                            class="w-full h-full object-cover transition-all duration-500">
                    </div>
                    <div id="thumbnails" class="flex gap-4 overflow-x-auto pb-2">
                        <!-- Thumbnails injected via JS -->
                    </div>
                </div>

                <!-- Informações do Produto -->
                <div class="flex flex-col justify-center">
                    <h1 id="product-title" class="text-4xl md:text-6xl font-bold italic mb-2 text-[#E6C2B3]"></h1>
                    <div class="w-20 h-1 bg-[#E6C2B3] mb-8"></div>

                    <div class="mb-8">
                        <span id="product-price" class="text-3xl font-light tracking-wide"></span>
                    </div>

                    <div class="space-y-6 text-lg leading-relaxed font-light opacity-90 mb-10">
                        <p id="product-description"></p>
                        <div id="detailed-prices"
                            class="bg-black/10 p-6 rounded-2xl space-y-2 hidden text-sm md:text-base">
                            <!-- Detailed prices for sets -->
                        </div>
                    </div>

                    <div class="mt-auto pt-6">
                        <div class="flex items-center gap-2 mb-6 opacity-70">
                            <i data-lucide="palette" class="w-4 h-4 text-[#E6C2B3]"></i>
                            <span class="text-xs uppercase tracking-widest">Encomendas em qualquer cor</span>
                        </div>

                        <a id="whatsapp-link" href="#" target="_blank"
                            class="group w-full md:w-auto inline-flex items-center justify-center gap-3 bg-[#25D366] text-[#4A1F12] px-8 py-5 rounded-full font-bold uppercase tracking-widest hover:brightness-110 transition-all shadow-lg hover:shadow-[#25D366]/20">
                            <i data-lucide="message-circle" class="w-5 h-5"></i>
                            <span>Encomendar Agora</span>
                            <i data-lucide="arrow-right"
                                class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Dados dos Produtos
        const products = {
            "bolsa": {
                title: "Bolsa Fio de Malha",
                price: "R$ 200,00",
                description: "Feita com fio de malha e zíper de jaqueta, a bolsa em fio de malha é ótima para dias de movimento e ser sua fiel companheira do dia a dia, com o tamanho de um notebook ela é espaçosa e tem um design moderno que combina com qualquer ocasião.",
                images: ["./produtos/bolsa_foto1.jfif", "./produtos/bolsa_foto2.jfif", "./produtos/bolsa_foto3.jfif"],
                whatsappMessage: "Olá! Gostaria de encomendar a Bolsa Fio de Malha."
            },
            "conjunto-ana": {
                title: "Conjunto Ana",
                price: "R$ 220,00",
                description: "O conjunto Ana consiste em um cropped no formato de borboleta e uma saída de praia com o acabamento em fios, ótima para noites na praia. Feita com barroco n•4 vem com o conforto e o design moderno que você precisa nesse verão.",
                detailedPrices: [
                    "<strong>Peças separadas:</strong>",
                    "Cropped borboleta tamanho P R$110.00 | M R$125,00 | G R$150,00",
                    "Saia vazada P 120,00 | M 130,00 | G 140,00",
                    "<em class='text-[#E6C2B3]'>*Ao pedir o conjunto leva com desconto</em>"
                ],
                // Fallback logical duplication since User only provided one specific image name for this, 
                // but usually web stores have multiple. I'll use the main one.
                images: ["./produtos/Cropped_saia.jfif"],
                whatsappMessage: "Olá! Gostaria de encomendar o Conjunto Ana."
            }
        };

        // Logic
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');
            const data = products[productId];

            if (!data) {
                // Redirect if invalid
                window.location.href = 'loja.html';
                return;
            }

            // Populate Content
            document.title = `Dunaviela - ${data.title}`;
            document.getElementById('product-title').innerText = data.title;
            document.getElementById('product-price').innerText = data.price;
            document.getElementById('product-description').innerText = data.description;

            // Detailed Prices
            if (data.detailedPrices) {
                const detailsContainer = document.getElementById('detailed-prices');
                detailsContainer.innerHTML = data.detailedPrices.map(line => `<p>${line}</p>`).join('');
                detailsContainer.classList.remove('hidden');
            }

            // WhatsApp Link
            const waLink = document.getElementById('whatsapp-link');
            waLink.href = `https://wa.me/554196683263?text=${encodeURIComponent(data.whatsappMessage)}`;

            // Cart Logic injection
            const rawPrice = parseFloat(data.price.replace('R$', '').replace('.', '').replace(',', '.').trim());

            // Update UI buttons
            const btnContainer = document.querySelector('.mt-auto.pt-6');
            btnContainer.innerHTML = `
                <div class="flex items-center gap-2 mb-6 opacity-70">
                    <i data-lucide="palette" class="w-4 h-4 text-[#E6C2B3]"></i>
                    <span class="text-xs uppercase tracking-widest">Encomendas em qualquer cor</span>
                </div>

                <div class="flex flex-col md:flex-row gap-4">
                     <button onclick="addToCart('${productId}', '${data.title}', '${data.price}', ${rawPrice}, '${data.images[0]}')" 
                        class="group flex-1 h-14 bg-white/5 border border-white/10 text-[#F1D8CD] rounded-full font-bold uppercase tracking-widest hover:bg-white/10 transition-all flex items-center justify-center gap-3">
                        <i data-lucide="shopping-bag" class="w-5 h-5"></i>
                        <span>No Carrinho</span>
                    </button>
                    
                    <button onclick="buyNow('${productId}', '${data.title}', '${data.price}', ${rawPrice}, '${data.images[0]}')"
                        class="group flex-1 h-14 bg-[#E6C2B3] text-[#4A1F12] rounded-full font-bold uppercase tracking-widest hover:brightness-110 transition-all shadow-lg flex items-center justify-center gap-3">
                        <span>Comprar</span>
                        <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                    </button>
                </div>
            `;

            lucide.createIcons();

            // Images
            const mainImg = document.getElementById('main-image');
            const thumbsContainer = document.getElementById('thumbnails');

            // Set initial
            mainImg.src = data.images[0];

            // Create Thumbs if > 1 image
            if (data.images.length > 1) {
                data.images.forEach((src, idx) => {
                    const thumb = document.createElement('img');
                    thumb.src = src;
                    thumb.className = `w-20 h-20 rounded-xl object-cover gallery-thumb ${idx === 0 ? 'active' : 'opacity-60'}`;
                    thumb.onclick = () => {
                        mainImg.src = src;
                        document.querySelectorAll('.gallery-thumb').forEach(t => {
                            t.classList.remove('active', 'opacity-100');
                            t.classList.add('opacity-60');
                        });
                        thumb.classList.remove('opacity-60');
                        thumb.classList.add('active', 'opacity-100');
                    };
                    thumbsContainer.appendChild(thumb);
                });
            } else {
                thumbsContainer.style.display = 'none';
            }

            // Show Content
            const preloader = document.getElementById('preloader');
            setTimeout(() => {
                preloader.style.opacity = '0';
                preloader.style.visibility = 'hidden';
                setTimeout(() => {
                    document.getElementById('main-content').classList.remove('opacity-0');
                }, 200);
            }, 600);
        });

        // Wrapper functions for HTML onclick
        function addToCart(id, title, price, rawPrice, image) {
            Cart.add({ id, title, price, rawPrice, image });
        }

        function buyNow(id, title, price, rawPrice, image) {
            Cart.add({ id, title, price, rawPrice, image });
            window.location.href = 'carrinho.html';
        }
    </script>
    <script src="cart.js"></script>
</body>

</html>
